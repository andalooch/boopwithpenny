<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Boop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #2C1F17; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: rgba(255,255,255,0.06); border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.08); }
    .logo { font-size: 36px; color: #F2D5C4; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 32px; letter-spacing: 1px; text-transform: uppercase; }
    label { display: block; font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; margin-top: 20px; }
    input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 16px; color: white; font-size: 16px; font-family: inherit; outline: none; }
    input:focus { border-color: #C4714A; }
    button { width: 100%; background: #C4714A; color: white; border: none; border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 24px; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .message { margin-top: 16px; padding: 14px; border-radius: 12px; font-size: 14px; text-align: center; display: none; }
    .message.success { background: rgba(122,158,126,0.2); color: #7A9E7E; display: block; }
    .message.error { background: rgba(224,82,82,0.2); color: #E05252; display: block; }
    .back { display: block; text-align: center; color: #F2D5C4; font-size: 14px; opacity: 0.6; margin-top: 20px; text-decoration: none; }
    .back:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐾 boop</div>
    <div class="subtitle">Reset your password</div>

    <div id="form-section">
      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" minlength="6" />

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your new password" />

      <button onclick="resetPassword()" id="btn">Update Password</button>
      <div id="message" class="message"></div>
    </div>

    <a href="/" class="back">← Back to Boop</a>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://zeiukxrrsplwoovfeplt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplaXVreHJyc3Bsd29vdmZlcGx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDQwODgsImV4cCI6MjA4OTAyMDA4OH0.PJfi2Xz1bVKs_rm7xkrFK2ndzl-BbHC6SwfERDEPTtw'
    )

    async function resetPassword() {
      const password = document.getElementById('password').value
      const confirm = document.getElementById('confirm').value
      const btn = document.getElementById('btn')
      const msg = document.getElementById('message')

      msg.className = 'message'
      msg.textContent = ''

      if (!password || password.length < 6) {
        msg.className = 'message error'
        msg.textContent = 'Password must be at least 6 characters.'
        return
      }

      if (password !== confirm) {
        msg.className = 'message error'
        msg.textContent = 'Passwords do not match.'
        return
      }

      btn.disabled = true
      btn.textContent = 'Updating...'

      const { error } = await supabase.auth.updateUser({ password })

      if (error) {
        msg.className = 'message error'
        msg.textContent = error.message
        btn.disabled = false
        btn.textContent = 'Update Password'
      } else {
        msg.className = 'message success'
        msg.textContent = '✅ Password updated! You can now sign in to Boop.'
        btn.textContent = 'Done!'
        document.getElementById('password').value = ''
        document.getElementById('confirm').value = ''
      }
    }
  </script>
</body>
</html>
